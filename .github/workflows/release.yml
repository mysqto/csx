name: release

# Cut a release by pushing a tag like v0.1.0.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to (re)build, e.g. v0.1.0"
        required: true

permissions:
  contents: write

env:
  BIN: csx

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          if ! printf '%s' "$tag" | grep -qE '^v[0-9A-Za-z.+-]+$'; then
            echo "::error::invalid tag '$tag'"; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        id: pkg
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          name="${BIN}-${tag}-${{ matrix.target }}"
          dist="dist/$name"
          mkdir -p "$dist"
          cp "target/${{ matrix.target }}/release/${BIN}" "$dist/"
          cp README.md LICENSE "$dist/" 2>/dev/null || true
          tar -C "$dist" -czf "dist/$name.tar.gz" .   # binary at archive root
          ( cd dist && shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256" )
          echo "artifact=dist/$name.tar.gz" >> "$GITHUB_OUTPUT"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: dist/*.tar.gz*
          if-no-files-found: error

  release:
    name: publish release + bump cask
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Resolve tag
        id: tag
        shell: bash
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          tag="${INPUT_TAG:-$REF_NAME}"
          if ! printf '%s' "$tag" | grep -qE '^v[0-9A-Za-z.+-]+$'; then
            echo "::error::invalid tag '$tag'"; exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.sha256' \) -exec cp {} dist/ \;
          ls -l dist
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: dist/*
      - name: Bump Homebrew cask
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.tag.outputs.tag }}"
          version="${tag#v}"
          sha() { cut -d' ' -f1 "dist/${BIN}-${tag}-$1.tar.gz.sha256"; }
          arm_mac=$(sha aarch64-apple-darwin)
          x86_mac=$(sha x86_64-apple-darwin)
          arm_lin=$(sha aarch64-unknown-linux-gnu)
          x86_lin=$(sha x86_64-unknown-linux-gnu)
          mkdir -p Casks
          cat > Casks/csx.rb <<RUBY
          # Auto-generated by .github/workflows/release.yml on each tag. Do not edit by hand.
          cask "csx" do
            version "${version}"

            on_macos do
              on_arm do
                sha256 "${arm_mac}"
                url "https://github.com/mysqto/csx/releases/download/v#{version}/csx-v#{version}-aarch64-apple-darwin.tar.gz"
              end
              on_intel do
                sha256 "${x86_mac}"
                url "https://github.com/mysqto/csx/releases/download/v#{version}/csx-v#{version}-x86_64-apple-darwin.tar.gz"
              end
            end
            on_linux do
              on_arm do
                sha256 "${arm_lin}"
                url "https://github.com/mysqto/csx/releases/download/v#{version}/csx-v#{version}-aarch64-unknown-linux-gnu.tar.gz"
              end
              on_intel do
                sha256 "${x86_lin}"
                url "https://github.com/mysqto/csx/releases/download/v#{version}/csx-v#{version}-x86_64-unknown-linux-gnu.tar.gz"
              end
            end

            livecheck do
              url :url
              strategy :github_latest
            end

            name "csx"
            desc "Local full-text + hybrid search across AI-coding sessions"
            homepage "https://github.com/mysqto/csx"

            binary "csx"
          end
          RUBY
      - name: Commit cask
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "mysqto"
          git config user.email "my@mysq.to"
          if ! git diff --quiet -- Casks/csx.rb; then
            git add Casks/csx.rb
            git commit -m "cask: bump to ${{ steps.tag.outputs.tag }}"
            git push origin HEAD:main
          else
            echo "cask unchanged"
          fi
